<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(144, 163, 144);
             /* background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2FsY3VsYXRvcnxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60'); */ */ */
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background: rgba(109, 178, 235, 0.9);
            padding: 20px;
            /* background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2FsY3VsYXRvcnxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60'); */ */ */
            background-size: cover;
            padding: 50px;
            border: radius 23px;
            box-shadow: 0 0 10px rgba(202, 20, 20, 0.3);
        }

        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 24px;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 20px;
        }

        button {
            height: 50px;
            font-size: 22px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        .operator {
            background: orange;
            color: white;
        }

        .equal {
            background: green;
            color: white;
            grid-column: span 3;
        }

        .clear {
            background: red;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">AC</button>
        <button onclick="appendValue('/') " class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">*</button>
        <button onclick="appendValue('-')" class="operator">-</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('2')">2</button>

        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            let result = eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        } catch {
            alert("Invalid Expression");
        }
    }
</script>

</body>
</html>
